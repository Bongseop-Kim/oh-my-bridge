version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - gocritic

  settings:
    gosec:
      excludes:
        - G204  # exec.Command — command from local config, not user input
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
