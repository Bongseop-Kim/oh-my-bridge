version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - gocritic
    - depguard
    - revive

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam

    depguard:
      rules:
        main:
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated since Go 1.16: use io or os instead"
            - pkg: "golang.org/x/net/context"
              desc: "use stdlib context instead"

    revive:
      rules:
        - name: blank-imports
          disabled: false
        - name: context-as-argument
          disabled: false
        - name: error-return
          disabled: false
        - name: error-naming
          disabled: false

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
