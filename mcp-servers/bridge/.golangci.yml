run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gosec
    - gocritic
    - gofmt

linters-settings:
  gosec:
    excludes:
      - G204  # exec.Command — command from local config, not user input
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
