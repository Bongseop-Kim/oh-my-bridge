version: 2

project_name: oh-my-bridge

builds:
  - id: oh-my-bridge
    main: ./mcp-servers/bridge
    binary: oh-my-bridge
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  use: git

brews:
  - name: oh-my-bridge
    repository:
      owner: Bongseop-Kim
      name: homebrew-oh-my-bridge
    homepage: https://github.com/Bongseop-Kim/oh-my-bridge
    description: MCP bridge server for delegating oh-my-bridge tasks to Gemini and Codex CLIs.
    license: MIT
    install: |
      bin.install "oh-my-bridge"
