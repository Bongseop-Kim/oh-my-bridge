name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp-servers/bridge/go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          working-directory: mcp-servers/bridge
          args: --config .golangci.yml

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp-servers/bridge/go.mod
      - name: Run tests
        working-directory: mcp-servers/bridge
        run: go test -count=1 -race -timeout 120s ./...
