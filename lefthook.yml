pre-commit:
  piped: true
  commands:
    embed:
      glob: "{skills/**,hooks/**,mcp-servers/bridge/**/*.go}"
      root: .
      run: make embed
    goimports-check:
      glob: "**/*.go"
      root: mcp-servers/bridge
      run: test -z "$(find . -name '*.go' | xargs goimports -l)"
    go-vet:
      glob: "**/*.go"
      root: mcp-servers/bridge
      run: go vet ./...
    golangci-lint:
      glob: "**/*.go"
      root: mcp-servers/bridge
      run: golangci-lint run --config .golangci.yml
    test:
      glob: "**/*.go"
      root: mcp-servers/bridge
      run: go test -short -count=1 -race -timeout 60s ./...
